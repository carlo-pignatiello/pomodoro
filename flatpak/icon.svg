<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Tomato body -->
  <circle cx="32" cy="40" r="22" fill="#ef4444"/>
  <!-- Highlight -->
  <ellipse cx="25" cy="33" rx="7" ry="5" fill="#f87171" opacity="0.45"/>
  <!-- Stem -->
  <rect x="29" y="13" width="6" height="11" rx="3" fill="#16a34a"/>
  <!-- Leaves -->
  <path d="M32 21 Q18 10 16 21 Q24 17 32 21Z" fill="#22c55e"/>
  <path d="M32 21 Q46 10 48 21 Q40 17 32 21Z" fill="#16a34a"/>
  <!-- Clock face -->
  <circle cx="32" cy="40" r="13" fill="none" stroke="white" stroke-width="1.5" opacity="0.35"/>
  <!-- Hour hand -->
  <line x1="32" y1="40" x2="32" y2="30" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <!-- Minute hand -->
  <line x1="32" y1="40" x2="41" y2="40" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
  <!-- Center dot -->
  <circle cx="32" cy="40" r="1.5" fill="white" opacity="0.9"/>
</svg>
