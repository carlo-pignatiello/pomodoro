id: io.github.eelpigna.Pomodoro
runtime: org.freedesktop.Platform
runtime-version: "24.08"
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: pomodoro

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/pomodoro/cargo

modules:
  - name: pomodoro
    buildsystem: simple
    build-commands:
      - cargo --offline fetch --manifest-path Cargo.toml --verbose
      - cargo --offline build --release --verbose
      - install -Dm755 target/release/pomodoro /app/bin/pomodoro
      - install -Dm644 io.github.eelpigna.Pomodoro.desktop
          /app/share/applications/io.github.eelpigna.Pomodoro.desktop
      - install -Dm644 io.github.eelpigna.Pomodoro.metainfo.xml
          /app/share/metainfo/io.github.eelpigna.Pomodoro.metainfo.xml
      - install -Dm644 icon.svg
          /app/share/icons/hicolor/scalable/apps/io.github.eelpigna.Pomodoro.svg
    sources:
      - type: git
        url: https://github.com/carlo-pignatiello/pomodoro
        tag: v0.1.0
        # Update this to the commit hash matching the tag above:
        commit: 6dfb5be18b21261a3dc857f86bee9a483a285076
      - type: file
        path: io.github.eelpigna.Pomodoro.desktop
      - type: file
        path: io.github.eelpigna.Pomodoro.metainfo.xml
      - type: file
        path: icon.svg
      # cargo-sources.json must be generated before building.
      # From the flatpak/ directory run:
      #   curl -L -o flatpak-cargo-generator.py \
      #     https://raw.githubusercontent.com/flatpak/flatpak-builder-tools/master/cargo/flatpak-cargo-generator.py
      #   python3 flatpak-cargo-generator.py ../Cargo.lock -o cargo-sources.json
      - cargo-sources.json
